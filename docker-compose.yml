services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astracart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astracart_password}
      POSTGRES_DB: ${POSTGRES_DB:-astracart}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astracart}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [astracart]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [astracart]

  user-service:
    build: ./services/user-service
    env_file: .env.example
    environment:
      DATABASE_URL: ${USER_DATABASE_URL:-postgresql+psycopg://astracart:astracart_password@postgres:5432/users_db}
      SERVICE_NAME: user-service
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8001:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [astracart]

  product-service:
    build: ./services/product-service
    env_file: .env.example
    environment:
      DATABASE_URL: ${PRODUCT_DATABASE_URL:-postgresql+psycopg://astracart:astracart_password@postgres:5432/products_db}
      SERVICE_NAME: product-service
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8002:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [astracart]

  cart-service:
    build: ./services/cart-service
    env_file: .env.example
    environment:
      DATABASE_URL: ${CART_DATABASE_URL:-postgresql+psycopg://astracart:astracart_password@postgres:5432/carts_db}
      SERVICE_NAME: cart-service
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8003:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [astracart]

  order-service:
    build: ./services/order-service
    env_file: .env.example
    environment:
      DATABASE_URL: ${ORDER_DATABASE_URL:-postgresql+psycopg://astracart:astracart_password@postgres:5432/orders_db}
      SERVICE_NAME: order-service
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8004:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [astracart]

  payment-service:
    build: ./services/payment-service
    env_file: .env.example
    environment:
      DATABASE_URL: ${PAYMENT_DATABASE_URL:-postgresql+psycopg://astracart:astracart_password@postgres:5432/payments_db}
      SERVICE_NAME: payment-service
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8005:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [astracart]

  notification-service:
    build: ./services/notification-service
    env_file: .env.example
    environment:
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL:-postgresql+psycopg://astracart:astracart_password@postgres:5432/notifications_db}
      SERVICE_NAME: notification-service
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8006:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [astracart]

  celery-worker:
    build: ./services/notification-service
    command: celery -A app.tasks.celery_app worker --loglevel=INFO --concurrency=2
    env_file: .env.example
    environment:
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL:-postgresql+psycopg://astracart:astracart_password@postgres:5432/notifications_db}
    depends_on:
      notification-service: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [astracart]

  cart-cleaner:
    build: ./services/cart-service
    command: celery -A app.tasks.celery_app beat --loglevel=INFO
    env_file: .env.example
    environment:
      DATABASE_URL: ${CART_DATABASE_URL:-postgresql+psycopg://astracart:astracart_password@postgres:5432/carts_db}
    depends_on:
      cart-service: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [astracart]

  api-gateway:
    build: ./services/api-gateway
    env_file: .env.example
    depends_on:
      user-service: { condition: service_healthy }
      product-service: { condition: service_healthy }
      cart-service: { condition: service_healthy }
      order-service: { condition: service_healthy }
      payment-service: { condition: service_healthy }
      notification-service: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8080:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [astracart]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    depends_on:
      api-gateway: { condition: service_healthy }
    ports: ["3000:3000"]
    networks: [astracart]

networks:
  astracart:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
